# Práctica 3 - GitHub Actions (dummy)

name: CI/CD
on:
  push:
    branches: ['**']
  pull_request:
    branches: [develop, master]
  workflow_dispatch:
    inputs:
      RUN_CD:
        description: 'Ejecutar CD (solo develop/master)'
        type: boolean
        default: false
      DEPLOY_ENV:
        description: 'Entorno de despliegue'
        type: choice
        options: [DEV, PRO]
        default: DEV

env:
  IMAGE_NAME: "scalian_training-java-hello-world:0.0.2"
  APP_URL: "http://localhost:8084/hello"

jobs:
  ci:
    name: CI
    #runs-on: ubuntu-latest
    runs-on: [self-hosted, linux, docker]
    environment: ${{ github.ref_name == 'master' && 'PRO' || 'DEV' }}
    container:
      image: maven:3.8.6-openjdk-11-slim
    env:
      APP_URL: "http://localhost:9999/hello"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Info
        run: |
          echo "Branch:      ${{ github.ref_name }}"
          echo "SHA:         ${{ github.sha }}"
          echo "Runner OS:   ${{ runner.os }}"
          echo "Runner Name: ${{ runner.name }}"
      - name: Variables
        run: |
          echo "IMAGE_NAME:  ${{ env.IMAGE_NAME }}"
          echo "APP_URL:     ${{ env.APP_URL }}"
          echo "APP_URL (shell): $APP_URL"
      - name: Inputs
        run: |
          echo "RUN_CD:     ${{ inputs.RUN_CD }}"
          echo "DEPLOY_ENV: ${{ inputs.DEPLOY_ENV }}"
      - name: Install make
        run: apt-get update && apt-get install -y --no-install-recommends make
      - name: Lint
        run: make lint
      - name: Test
        run: make test

  build:
    name: Build image
    #runs-on: ubuntu-latest
    runs-on: [self-hosted, linux, docker]
    needs: [ci]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build image
        run: docker build -t "$IMAGE_NAME" -f devops/Dockerfile .

  cd:
    name: CD
    #runs-on: ubuntu-latest
    runs-on: [self-hosted, linux, docker]
    needs: [build]
    if: >
      (github.ref_name == 'develop' || github.ref_name == 'master')
      || inputs.RUN_CD == true
    environment: ${{ github.ref_name == 'master' && 'PRO' || 'DEV' }}
    env:
      DEPLOY_ENV: ${{ github.ref_name == 'master' && 'PRO' || 'DEV' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Deploy info
        run: |
          echo "Deploying to $DEPLOY_ENV"
          echo "Branch: ${{ github.ref_name }}"
          echo "RUN_CD: ${{ inputs.RUN_CD }}"
      - name: Build image
        run: docker build -t "$IMAGE_NAME" -f devops/Dockerfile .
      - name: Deploy
        run: |
          docker compose up -d app
          sleep 5
          docker compose logs app
      - name: Cleanup
        if: always()
        run: |
          docker compose down --volumes || true
          docker rmi "$IMAGE_NAME" || true




