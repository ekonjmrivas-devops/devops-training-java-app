# Práctica 5 Pipelines CD/CI Azure DevOps
# Ejercicio 1+2+3 Pipeline con stages, variables y parámetros
# Ejercicio 4+5 CI con Maven + build imagen Docker
# Fix Ejecutar jobs con dependencia dentro de stage CI
# Fix E4+E5: usar ci.Dockerfile para lint y test sin montar volumen
# Fix E4+E5: docker run con --user para evitar permisos root
# Fix E4+E5: fix maven.repo.local para evitar warning de permisos
# E6+E7: stage CD con condicion, deploy y cleanup

trigger:
  branches:
    include:
      - develop
      - main

parameters:
  - name: RUN_CD
    displayName: "Ejecutar CD"
    type: boolean
    default: false
  - name: ENABLE_REGISTRY_PUSH
    displayName: "Push imagen al registry"
    type: boolean
    default: false

variables:
  - group: devops-training-java-saas
  - name: COMPOSE_FILE
    value: docker-compose.yml
  - name: COMPOSE_SERVICE
    value: app

stages:
  - stage: CI
    displayName: "Integracion Continua"
    jobs:
      - job: Info
        pool:
          name: local-docker
        steps:
          - script: |
              echo "Rama:       $(Build.SourceBranchName)"
              echo "Commit:     $(Build.SourceVersion)"
              echo "IMAGE_REPO: $(IMAGE_REPO)"
              echo "Agente:     $(Agent.Name)"
            displayName: "Info del pipeline"

      - job: Lint
        pool:
          name: local-docker
        dependsOn: Info
        steps:
          - script: |
              docker run --rm \
                -v $(pwd):/app \
                -w /app \
                --user $(id -u):$(id -g) \
                -e MAVEN_OPTS="-Dmaven.repo.local=/app/.m2" \
                maven:3.8.6-openjdk-11-slim \
                mvn -q -Dmaven.repo.local=/app/.m2 -DskipTests=true test
            displayName: "Lint (mvn compile sin tests)"

      - job: Test
        pool:
          name: local-docker
        dependsOn: Lint
        steps:
          - script: |
              docker run --rm \
                -v $(pwd):/app \
                -w /app \
                --user $(id -u):$(id -g) \
                -e MAVEN_OPTS="-Dmaven.repo.local=/app/.m2" \
                maven:3.8.6-openjdk-11-slim \
                mvn -q -Dmaven.repo.local=/app/.m2 test
            displayName: "Test (mvn test)"

      - job: BuildImage
        pool:
          name: local-docker
        dependsOn: Test
        steps:
          - script: |
              VERSION=$(cat VERSION)
              echo "##vso[task.setvariable variable=IMAGE_TAG;isOutput=true]$VERSION"
              docker build -t $(IMAGE_REPO):$VERSION --build-arg VERSION=$VERSION -f devops/Dockerfile .
            name: build
            displayName: "docker build"
          - script: |
              echo "$(DOCKERHUB_PASSWORD)" | docker login -u "$(DOCKERHUB_USERNAME)" --password-stdin
              docker push $(IMAGE_REPO):$(build.IMAGE_TAG)
              docker logout
            displayName: "docker push (Docker Hub)"
            condition: and(succeeded(), eq('${{ parameters.ENABLE_REGISTRY_PUSH }}', true))

  - stage: CD
    displayName: "Despliegue Continuo"
    dependsOn: CI
    condition: |
      and(succeeded(), or(
        eq(variables['Build.SourceBranchName'], 'develop'),
        eq(variables['Build.SourceBranchName'], 'main'),
        eq('${{ parameters.RUN_CD }}', true)
      ))
    jobs:
      - job: Deploy
        pool:
          name: local-docker
        variables:
          IMAGE_TAG: $[ stageDependencies.CI.BuildImage.outputs['build.IMAGE_TAG'] ]
        steps:
          - script: |
              if [ "$(Build.SourceBranchName)" = "main" ]; then
                echo "##vso[task.setvariable variable=DEPLOY_ENV]PRO"
              else
                echo "##vso[task.setvariable variable=DEPLOY_ENV]DEV"
              fi
              echo "DEPLOY_ENV=$(DEPLOY_ENV)"
            displayName: "Resolver DEPLOY_ENV"
          - script: |
              echo "==> Deploy en $(DEPLOY_ENV)"
              docker compose -f $(COMPOSE_FILE) up -d $(COMPOSE_SERVICE)
            displayName: "docker compose up"
          - script: |
              sleep 3
              docker compose -f $(COMPOSE_FILE) logs $(COMPOSE_SERVICE)
            displayName: "Logs del servicio"
          - script: |
              docker compose -f $(COMPOSE_FILE) down --volumes --remove-orphans || true
              docker rmi $(IMAGE_REPO):$(IMAGE_TAG) || true
              echo "Cleanup completado"
            displayName: "Cleanup (always)"
            condition: always()
