stages:
  - ci
  - cd

variables:
  IMAGE_NAME: "scalian_training-java-hello-world:0.0.2"
  APP_URL: "http://localhost:8084/hello"

ci:info:
  stage: ci
  script:
    - echo "Rama $CI_COMMIT_BRANCH"
    - echo "Commit $CI_COMMIT_SHORT_SHA"
    - echo "Imagen $IMAGE_NAME"
    - echo "URL $APP_URL"

ci:lint:
  stage: ci
  image: maven:3.8.6-openjdk-11-slim
  script:
    - mvn -q -DskipTests=true test

ci:test:
  stage: ci
  image: maven:3.8.6-openjdk-11-slim
  script:
    - mvn -q test

ci:build-image:
  stage: ci
  image: docker:27
  services:
    - docker:27-dind
  script:
    - VERSION=$(cat VERSION)
    - echo "Construyendo imagen $IMAGE_NAME con VERSION=$VERSION"
    - docker build -t $IMAGE_NAME --build-arg VERSION=$VERSION -f devops/Dockerfile .

cd:deploy:
  stage: cd
  image: docker:27
  services:
    - docker:27-dind
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main"'
      when: on_success
    - when: never
  script:
    - echo "TODO deploy"
  after_script:
    - echo "TODO cleanup"
