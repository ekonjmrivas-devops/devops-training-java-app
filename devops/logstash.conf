input {
  file {
    path => "/logs/app.log"
    start_position => "beginning"
    codec => "json"
  }
}

filter {
  if [correlationId] {
    mutate {
      add_tag => ["has_correlation_id"]
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "spring-boot-logs-%{+YYYY.MM.dd}"
  }
  stdout {
    codec => rubydebug
  }
}
