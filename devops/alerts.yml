groups:
  - name: spring-boot-alerts
    rules:
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95,
            rate(http_server_requests_seconds_bucket[5m])
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Alta latencia en la aplicación"
          description: "El percentil 95 de latencia supera 1 segundo"

      - alert: HighErrorRate
        expr: |
          rate(http_server_requests_seconds_count{status=~"5.."}[5m])
          / rate(http_server_requests_seconds_count[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Tasa de errores alta"
          description: "Más del 5% de requests están fallando"

      - alert: ServiceDown
        expr: up{job="spring-boot-app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Servicio caído"
          description: "La aplicación Spring Boot no responde"

      - alert: HighHeapMemory
        expr: |
          jvm_memory_used_bytes{area="heap"}
          / jvm_memory_max_bytes{area="heap"} > 0.80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Memoria heap al 80%"
          description: "Riesgo de OutOfMemoryError inminente"
